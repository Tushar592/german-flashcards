<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1"
  >

  <meta
    name="robots"
    content="noindex"
  >

  <title>
    Deutsche Vokabeltrainer
  </title>

  <link
    rel="preconnect"
    href="https://fonts.googleapis.com"
  >

  <link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
  >

  <link
    href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --bg: #f1f0ec;
      --surface: #ffffff;
      --ink: #17181c;
      --ink-soft: #5a5b61;
      --ink-faint: #9a9a9f;
      --line: #e3e1d9;
      --accent: #0d7d63;
      --accent-2: #0a6250;
      --sh-md:
        0 8px 24px rgba(23, 24, 28, 0.09);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--ink);
      font-family:
        'Hanken Grotesk',
        sans-serif;
      padding: 20px;
      background-image:
        radial-gradient(
          600px 380px at 100% -10%,
          rgba(13, 125, 99, 0.08),
          transparent 62%
        );
    }

    main {
      width: min(600px, 100%);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 34px 24px;
      box-shadow: var(--sh-md);
      text-align: center;
    }

    h1 {
      font-family:
        'Bricolage Grotesque',
        sans-serif;
      font-size:
        clamp(
          2.35rem,
          8vw,
          3.6rem
        );
      font-weight: 800;
      line-height: 0.96;
      letter-spacing: -0.035em;
    }

    p {
      color: var(--ink-soft);
      font-size: 14px;
      line-height: 1.6;
      margin: 14px auto 20px;
      max-width: 470px;
    }

    a {
      min-height: 48px;
      padding: 0 22px;
      border-radius: 13px;
      background: var(--accent);
      color: #ffffff;
      text-decoration: none;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--sh-md);
      transition: 0.14s;
    }

    a:hover {
      background: var(--accent-2);
    }

    .note {
      display: block;
      margin-top: 15px;
      color: var(--ink-faint);
      font-size: 11px;
    }
  </style>
</head>

<body>
  <main>
    <h1>
      Deutsche<br>
      Vokabeltrainer
    </h1>

    <!--
      Replace only PUBLIC_LEARNER_WEB_APP_URL
      with the public learner Apps Script /exec URL.

      Never put the private admin URL here.
    -->
    <a href="https://script.google.com/macros/s/AKfycbz0BfqQstR05vMBt6Jy8KarVP-Fk50UkFTr2bqjEEKKMwUZ3XBfpt6TjlhekQ1B7t4aKg/exec">
      Open the secure app
    </a>

    <span class="note">
      Created by Tushar Jejurkar
    </span>
  </main>
</body>
</html>
